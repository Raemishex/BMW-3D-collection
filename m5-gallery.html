<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M5 F90 | Gallery</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="m5-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="m5.html" class="logo">BMW <span style="color:var(--primary-color)">M5</span></a>
        <nav class="nav-links">
            <a href="m5.html">Experience</a>
            <a href="m5-specs.html">Specs</a>
            <a href="m5-gallery.html" class="active">Gallery</a>
        </nav>
        <div class="menu-btn">
            <i class="fas fa-bars" style="color:white; font-size:1.5rem; cursor:pointer;"></i>
        </div>
    </header>

    <div class="page-container">
        <h1 class="specs-title stagger-item" style="animation-delay: 0.1s;">Design <span style="color:var(--primary-color)">DETAILS</span></h1>
        
        <div class="gallery-grid">
            <div class="gallery-item stagger-item skeleton" style="animation-delay: 0.2s;">
                <img src="images/BMW-M5-Seats.png" alt="Interior Seating" loading="lazy" width="800" height="600" onload="this.parentElement.classList.remove('skeleton')">
                <div class="gallery-caption">M Sport Seats</div>
            </div>
            <div class="gallery-item stagger-item skeleton" style="animation-delay: 0.3s;">
                <img src="images/Cockpit M5.jpg" alt="Steering Wheel" loading="lazy" width="800" height="600" onload="this.parentElement.classList.remove('skeleton')">
                <div class="gallery-caption">Cockpit</div>
            </div>
            <div class="gallery-item stagger-item skeleton" style="animation-delay: 0.4s;">
                <img src="images/Laser Lights M5.png" alt="Tail Lights" loading="lazy" width="800" height="600" onload="this.parentElement.classList.remove('skeleton')">
                <div class="gallery-caption">Laser Lights</div>
            </div>
            <div class="gallery-item stagger-item skeleton" style="animation-delay: 0.5s;">
                <img src="images/Carbon Fiber M5.png" alt="Carbon Body" loading="lazy" width="800" height="600" onload="this.parentElement.classList.remove('skeleton')">
                <div class="gallery-caption">Carbon Fiber</div>
            </div>
        </div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <audio id="bg-music" loop autoplay>
        <source src="music/VISION - UdieNnx & HXVSAGE (Slowed & Reverb)  Car in Space Edit - Paradox Aimon.mp3" type="audio/mpeg">
    </audio>

    <script src="utils.js"></script>
    <script src="m5-script.js"></script>
</body>
</html>
