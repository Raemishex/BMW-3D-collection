<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M5 F90 | The Ultimate Driving Machine</title>
    <link rel="stylesheet" href="m5-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="hero-body">

    <div id="video-container">
        <div class="video-overlay"></div>
    </div>

    <header>
        <a href="index.html" class="logo">BMW <span style="color:var(--primary-color)">M5</span></a>
        <nav class="nav-links">
            <a href="#" class="active">Experience</a>
            <a href="m5-specs.html">Specs</a>
            <a href="m5-gallery.html">Gallery</a>
        </nav>
        <div class="menu-btn">
            <i class="fas fa-bars" style="color:white; font-size:1.5rem; cursor:pointer;"></i>
        </div>
    </header>

    <section class="hero-section">
        
        <div class="bg-text"></div>

        <button class="nav-arrow left" id="prevBtn">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-arrow right" id="nextBtn">
            <i class="fas fa-chevron-right"></i>
        </button>

        <div class="spec-box top-right">
            <span class="spec-val">617 <span style="font-size:1rem">HP</span></span>
            <span class="spec-label">Horsepower</span>
        </div>
        <div class="spec-box bottom-left">
            <span class="spec-val">3.1 <span style="font-size:1rem">s</span></span>
            <span class="spec-label">0-60 MPH</span>
        </div>

    <audio id="bg-music" loop>
        <source src="music/VISION - UdieNnx & HXVSAGE (Slowed & Reverb)  Car in Space Edit - Paradox Aimon.mp3" type="audio/mpeg">
    </audio>

        <div class="content-overlay">
            
            <h1 class="model-name">M5 F90</h1>
            <p class="subtitle">Competition</p>
        </div>

    </section>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script src="m5-script.js"></script>
</body>
</html>
