<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M4 CSL | Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">BMW <span style="color:var(--primary-color)">M4</span></a>
        <nav class="nav-links">
            <a href="cars.html">Experience</a>
            <a href="specs.html">Specs</a>
            <a href="gallery.html" class="active">Gallery</a>
        </nav>
        <div class="menu-btn">
            <i class="fas fa-bars" style="color:white; font-size:1.5rem; cursor:pointer;"></i>
        </div>
    </header>

    <div class="page-container">
        <h1 class="specs-title">Design <span style="color:var(--primary-color)">DETAILS</span></h1>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="images/m4-csl-3-3.jpg" alt="Interior Seating">
                <div class="gallery-caption">Carbon Seats</div>
            </div>
            <div class="gallery-item">
                <img src="images/m4-csl-4-4.jpg" alt="Steering Wheel">
                <div class="gallery-caption">Cockpit</div>
            </div>
            <div class="gallery-item">
                <img src="images/m4-csl-5-5.webp" alt="Tail Lights">
                <div class="gallery-caption">Laser Lights</div>
            </div>
            <div class="gallery-item">
                <img src="images/m4-csl-6-6.webp" alt="Carbon Body">
                <div class="gallery-caption">Carbon Fiber</div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop autoplay>
        <source src="music/Never let go of me - Baltra [Slowed_Tiktok] - RoseSenpai.mp3" type="audio/mpeg">
    </audio>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script src="script.js"></script>
</body>
</html>
