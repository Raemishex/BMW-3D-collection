<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Collection | Select Your Experience</title>
    <link rel="preload" href="images/bmw-m4-csl-walpaper.jpg" as="image">
    <link rel="preload" href="images/BMW-M5-F90-walpaper.jpg" as="image">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="landing-body">

    <header>
        <div class="logo">BMW <span style="color:var(--primary-color)">COLLECTION</span></div>
    </header>

    <section class="landing-section">
        <h1 class="landing-title stagger-item" style="animation-delay: 0.1s;">CHOOSE YOUR BMW M SERIES</h1>
        
        <div class="car-grid">
            
            <div class="car-card stagger-item" style="animation-delay: 0.3s;" onclick="window.location.href='cars.html'">
                <div class="card-bg" style="background-image: url(images/bmw-m4-csl-walpaper.jpg);"></div>
                <div class="card-content">
                    <h2>BMW M4 CSL</h2>
                    <p>Competition Sport Lightweight</p>
                    <span class="explore-btn">EXPERIENCE <i class="fas fa-arrow-right"></i></span>
                </div>
                <audio class="car-audio" loop>
                    <source src="music/Never let go of me - Baltra [Slowed_Tiktok] - RoseSenpai.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="car-card stagger-item" style="animation-delay: 0.5s;" onclick="window.location.href='m5.html'">
                <div class="card-bg" style="background-image: url('images/BMW-M5-F90-walpaper.jpg');"></div>
                <div class="card-content">
                    <h2>BMW M5 F90</h2>
                    <p>Competition</p>
                    <span class="explore-btn">EXPERIENCE <i class="fas fa-arrow-right"></i></span>
                </div>
                <audio class="car-audio" loop>
                    <source src="music/VISION - UdieNnx & HXVSAGE (Slowed & Reverb)  Car in Space Edit - Paradox Aimon.mp3" type="audio/mpeg">
                </audio>
            </div>

            <!-- Car 3: BMW M3 TOURING -->
            <div class="car-card car-card--locked stagger-item" style="animation-delay: 0.7s;" id="m3-card">
                <div class="card-bg" style="background-image: url('images/BMW M3 TOURING.jpeg');"></div>
                <div class="lock-overlay">
                    <div class="shimmer-overlay"></div>
                    <i class="fas fa-lock"></i>
                    <div class="countdown-timer" id="countdown">
                        <div class="timer-segment"><span id="days">00</span><label>Days</label></div>
                        <div class="timer-segment"><span id="hours">00</span><label>Hrs</label></div>
                        <div class="timer-segment"><span id="minutes">00</span><label>Min</label></div>
                        <div class="timer-segment"><span id="seconds">00</span><label>Sec</label></div>
                    </div>
                </div>
                <div class="card-content">
                    <h2>BMW M3 TOURING</h2>
                    <p>Coming Soon</p>
                    <div class="notify-container" id="notify-container">
                        <input type="email" placeholder="Enter your email" id="notify-email">
                        <button id="notify-btn">NOTIFY ME</button>
                    </div>
                </div>
                <audio class="car-audio" loop>
                    <source src="music/starly (Ultra Slowed) - LONOWN.mp3" type="audio/mpeg">
                </audio>
            </div>

        </div>
    </section>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script src="utils.js"></script>
    <script>
        // Hero text staggered entrance is handled by base.css and utils.js
    </script>
</body>
</html>
